# ============================================================
# InterviewIQ AI - Application Configuration
# ============================================================

# Server
server.port=8080

# ==================== PostgreSQL Database ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_db
spring.datasource.username=postgres
spring.datasource.password=venu3421
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================== JWT Authentication ====================
jwt.secret=InterviewIQ_AI_2024_Super_Secure_JWT_Secret_Key_64_Characters_Long_!!
jwt.expiration=86400000

# ==================== AI Microservice ====================
ai.service.url=http://localhost:8000

# ==================== File Upload Limits ====================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ==================== Google OAuth 2.0 ====================
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:your-google-client-id}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:your-google-client-secret}

# ==================== Logging ====================
logging.level.com.project.system=DEBUG
logging.level.org.springframework.security=DEBUG

